background {
    monitor =
    path = ~/.local/share/wallpapers/current.jpg
    blur_passes = 2
    blur_size = 7
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 72
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(220, 220, 220, 1.0)
    font_size = 24
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.35)
    outer_color = rgba(255, 255, 255, 0.25)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    rounding = 12
    position = 0, -40
    halign = center
    valign = center
}

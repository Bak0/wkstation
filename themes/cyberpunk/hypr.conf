# Hyprland basic cyberpunk theme
monitor=DP-1,1920x1080@144Hz,0x0,1

# gaps
gaps_in 12
gaps_out 12
gaps_top 32

# borders
border_size 2
border_focused #00FFEA
border_unfocused #222222

# colors
active_workspace_color #00FFEA
inactive_workspace_color #444444
background_color #1B1B2F
foreground_color #F0F0F0

# floating rules example
floatclass=confirm,dialog

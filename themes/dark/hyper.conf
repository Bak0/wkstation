# Hyprland basic dark theme
monitor=DP-1,1920x1080@144Hz,0x0,1

# gaps
gaps_in 10
gaps_out 10
gaps_top 30

# borders
border_size 2
border_focused #FF5C57
border_unfocused #3A3A3A

# colors
active_workspace_color #FF5C57
inactive_workspace_color #555555
background_color #1E1E2E
foreground_color #FFFFFF

# floating rules example
floatclass=confirm,dialog
